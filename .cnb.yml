$:
  vscode:
    - runner:
        cpus: 16
      docker: 
        image: docker.cnb.cool/zhxycn/env:latest
      services:
        - vscode
        - docker
      imports:
        - https://cnb.cool/TokenTeam/secrets/-/blob/main/expo.yml
      env:
        CNB_WELCOME_EXECUTE_COMMAND: bash scripts/build-android.sh development

main:
  push:
    - docker:
        image: docker.cnb.cool/zhxycn/env:latest
      stages:
        - script: |
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            yarn install --frozen-lockfile
            yarn run lint

  web_trigger_job:
    - runner:
        cpus: 16
      docker:
        image: docker.cnb.cool/zhxycn/env:latest
      imports:
        - https://cnb.cool/TokenTeam/secrets/-/blob/main/expo.yml
      stages:
        - script: |
            IFS=',' read -ra PROFILES <<< "$BUILD_PROFILES"
            for profile in "${PROFILES[@]}"; do
              echo "=== Building $profile ==="
              bash scripts/build-android.sh "$profile"
              for f in *.apk; do
                [ -f "$f" ] || continue
                [[ "$f" == iwut-* ]] && continue
                mv "$f" "iwut-${profile}.apk"
              done
            done
          timeout: 2h
        - image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./iwut-*.apk"
