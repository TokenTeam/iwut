branch:
  - buttons:
      - name: Build Android
        event: web_trigger_job
        isDefault: true
        inputs:
          BUILD_PROFILES:
            type: select
            multiple: true
            required: true
            options:
              - name: Development
                value: development
              - name: Preview
                value: preview
              - name: Production
                value: production
          UPLOAD:
            name: Upload to Cloudflare R2
            type: switch
            default: "false"
            options:
              - name: "Yes"
                value: "true"
              - name: "No"
                value: "false"
  - reg: ^main$
    buttons:
      - name: OTA Update
        event: web_trigger_ota
