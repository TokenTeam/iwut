name: 🐛 Bug 报告
description: 报告应用中的错误或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！请尽可能详细地填写以下信息，这将帮助我们更快地定位和解决问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰、简洁地描述遇到的问题
      placeholder: 例如：在尝试导入课表时，应用崩溃了
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备与系统
      description: 您使用的设备型号和系统版本
      placeholder: 例如：iPhone 15 / iOS 18.2，Redmi K70 / Android 15
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 可在「关于」页面查看版本号
      placeholder: 例如：0.1.1-patch.3
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有相关截图，请粘贴至此

  - type: textarea
    id: logs
    attributes:
      label: 日志信息
      description: 如果有错误日志或崩溃信息，请粘贴至此（请移除账号密码等敏感信息）
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已将应用更新到最新版本
          required: true
        - label: 我已经搜索过现有的 Issues，确认这是一个新问题
          required: true
        - label: 我已经移除了所有敏感信息
          required: true
